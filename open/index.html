<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening in SixteenCloud...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
    }
    .container { max-width: 420px; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.75rem; }
    p { color: #aaa; font-size: 0.95rem; line-height: 1.5; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #333;
      border-top-color: #f50;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 1.5rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    a {
      color: #f50;
      text-decoration: none;
    }
    a:hover { text-decoration: underline; }
    .fallback { margin-top: 1.5rem; display: none; }
    .fallback.visible { display: block; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Opening in SixteenCloud...</h1>
    <div class="spinner"></div>
    <p>If the app doesn't open, you'll be redirected to download it shortly.</p>
    <div class="fallback" id="fallback">
      <p>SixteenCloud not installed?</p>
      <p><a href="https://github.com/ocb2016/ocbbio/releases/latest">Download from GitHub</a></p>
    </div>
  </div>
  <script>
    (function() {
      var params = new URLSearchParams(window.location.search);
      var track = params.get('track');
      if (track) {
        window.location.href = 'sixteencloud://open/' + track;
      }
      setTimeout(function() {
        document.getElementById('fallback').classList.add('visible');
      }, 1500);
      setTimeout(function() {
        window.location.href = 'https://github.com/ocb2016/ocbbio/releases/latest';
      }, 2000);
    })();
  </script>
</body>
</html>
